<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 700" width="100%" height="100%" opacity="0.18">
  <g fill="none" stroke="#000000" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
    
    <!-- ================= LILY 1 (TOP LEFT) ================= -->
    <g transform="translate(200, 170)">
      <!-- Petals -->
      <path d="M 0 0 C -40 -70, -110 -60, -90 10 C -40 30, -10 20, 0 0 Z" />
      <path d="M 0 0 C 50 -60, 100 -30, 70 30 C 30 30, 10 10, 0 0 Z" />
      <path d="M 0 0 C 30 60, -20 100, -60 50 C -40 20, -10 10, 0 0 Z" />
      <path d="M 0 0 C -70 40, -110 -10, -80 -50 C -40 -30, -10 -10, 0 0 Z" />
      <!-- Stamens -->
      <path d="M 0 0 Q -15 -35 -30 -40" />
      <path d="M 0 0 Q 10 -35 20 -45" />
      <path d="M 0 0 Q -5 -45 -5 -55" />
      <circle cx="-30" cy="-40" r="2.5" fill="#000" />
      <circle cx="20" cy="-45" r="2.5" fill="#000" />
      <circle cx="-5" cy="-55" r="2.5" fill="#000" />
    </g>

    <!-- ================= LILY 2 (TOP RIGHT) ================= -->
    <g transform="translate(480, 240)">
      <!-- Petals -->
      <path d="M 0 0 C -30 -65, -95 -50, -75 15 C -30 30, -10 15, 0 0 Z" />
      <path d="M 0 0 C 55 -50, 95 -15, 65 40 C 25 35, 10 15, 0 0 Z" />
      <path d="M 0 0 C 35 65, -15 95, -55 45 C -35 15, -10 10, 0 0 Z" />
      <path d="M 0 0 C -65 35, -95 -15, -70 -50 C -35 -25, -10 -10, 0 0 Z" />
      <!-- Stamens -->
      <path d="M 0 0 Q -10 -30 -20 -38" />
      <path d="M 0 0 Q 15 -30 25 -38" />
      <circle cx="-20" cy="-38" r="2.5" fill="#000" />
      <circle cx="25" cy="-38" r="2.5" fill="#000" />
    </g>

    <!-- ================= CURVED CRISS-CROSS STEMS ================= -->
    <!-- Stem 1: Arcing from Left Lily down towards Bottom Right -->
    <path d="M 195 185 C 210 330, 330 480, 500 640" stroke-width="1.8" />
    <path d="M 250 290 Q 300 270, 315 310 Q 275 320, 250 290 Z" /> <!-- Leaf -->

    <!-- Stem 2: Arcing from Right Lily down towards Bottom Left (Crosses Stem 1) -->
    <path d="M 475 255 C 440 390, 310 490, 180 640" stroke-width="1.8" />
    <path d="M 420 370 Q 470 370, 465 420 Q 415 410, 420 370 Z" /> <!-- Leaf -->

  </g>
</svg>
